<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina registrazione</title>
</head>
<body>
    <header>
        <span>Primo sito di Ary</span>
        <nav>
            <ul>
                <li><a href="index.html">Homepage</a></li>
                <li><a href="articolo.html">Articoli</a></li>
                <li><a href="registrazione.html">Registrazione</a></li>
            </ul>   
        </nav>
    </header>
    <main>
        <h1>Registrazione</h1>
        <form action="#" method="post">
            <div>
            <label>
                Nome
            <input type="text" id="nome" name="nome">
            </label>
            </div>
            <div>
            <label>
                Cognome
            <input type="text" id="cognome" name="cognome">
            </label>
            </div>
            <div>
            <label>
                Email
            <input type="email" id="email" name="email">
            </label>
            </div>
            <div>
            <label>
                Password
            <input type="password" id="password" name="password">
            </label>
            </div>
            <div>
            <label>
                Conferma password
            <input type="password" id="conferma_password" name="conferma_password">
            </label>
            </div>
            <button type="submit">Registrati</button>
            <button type="reset">Reset</button>
        </form>
    </main>
    <footer>
      <nav>
            <ul>
                <li><a href="index.html">Homepage</a></li>
                <li><a href="articolo.html">Articoli</a></li>
                <li><a href="registrazione.html">Registrazione</a></li>
            </ul>   
        </nav>
    </footer>
</body>
</html>
